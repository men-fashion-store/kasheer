<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أيتن - الإدارة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p: #c25983; --pl: #fce4ec; --s: #4a148c; --bg: #fdfafb; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        
        header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--p); box-shadow: 0 4px 15px rgba(194, 89, 131, 0.1); position: sticky; top: 0; z-index: 100; }
        header img { height: 55px; border-radius: 50%; border: 2px solid var(--p); margin-bottom: 5px; }
        
        .role-btn { position: absolute; top: 15px; left: 15px; font-size: 11px; background: var(--pl); padding: 5px 10px; border-radius: 20px; color: var(--p); font-weight: bold; cursor: pointer; border: 1px solid var(--p); }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); border: 1px solid #fce4ec; }
        .title { color: var(--p); font-weight: bold; font-size: 16px; margin-bottom: 15px; display: block; border-right: 4px solid var(--p); padding-right: 10px; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; outline: none; transition: 0.3s; font-weight: bold; }
        input:focus, select:focus { border-color: var(--p); background: #fff; box-shadow: 0 0 0 3px var(--pl); }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--p); color: #fff; }
        .btn-out { background: #e74c3c; color: #fff; }
        .btn-save { background: var(--s); color: #fff; margin-top: 15px; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > * { flex: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: var(--pl); padding: 10px; text-align: right; color: var(--s); border-radius: 5px 5px 0 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .stats { display: flex; justify-content: space-between; text-align: center; margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 10px; border: 1px dashed var(--p); }
        .stats div { flex: 1; }
        .stats span { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav div { flex: 1; text-align: center; padding: 15px; color: #aaa; font-weight: bold; cursor: pointer; }
        .nav div.active { color: var(--p); border-top: 3px solid var(--p); background: var(--pl); }
        
        .hidden { display: none; }
        .low-stock { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="role-btn" onclick="toggleRole()">لوحة الإدارة 🔒</div>
    <img src="icon.png" alt="لوجو" onerror="this.src='https://via.placeholder.com/60/c25983/fff?text=A'">
    <h2 style="margin:0; color:var(--p); font-size:20px;">أيتـن Aytin <span id="role-text" style="font-size:12px; color:#888;">(كاشير)</span></h2>
</header>

<div class="container">
    
    <div id="cashier-tab">
        <div class="card">
            <span class="title">تسجيل مبيعات 🛍️</span>
            <select id="pos-model"></select>
            
            <div class="flex-row">
                <input type="number" id="pos-qty" placeholder="العدد" value="1" min="1" style="flex: 0.4;">
                <input type="number" id="pos-price" placeholder="سعر القطعة الواحدة (ج.م)">
            </div>
            
            <button class="btn-p" onclick="sellItem()">تأكيد البيع وخصم القطع</button>
        </div>

        <div class="card">
            <span class="title" style="color:#e74c3c; border-color:#e74c3c;">تسجيل خارج / مصروفات 💸</span>
            <div class="flex-row">
                <input type="text" id="out-desc" placeholder="البيان (غداء، شاي...)">
                <input type="number" id="out-val" placeholder="المبلغ">
            </div>
            <button class="btn-out" onclick="addExpense()">سجل مصروف (-)</button>
        </div>

        <div class="card">
            <span class="title">يومية الوردية</span>
            <div class="stats">
                <div>مبيعات<br><span id="stat-in" style="color:#2ecc71">0</span></div>
                <div>مصروفات<br><span id="stat-out" style="color:#e74c3c">0</span></div>
                <div>الصافي<br><span id="stat-net" style="color:var(--s)">0</span></div>
            </div>
            <table>
                <thead><tr><th>البيان</th><th>المبلغ</th><th>الوقت</th></tr></thead>
                <tbody id="ledger-body"></tbody>
            </table>
            <button class="btn-save" onclick="saveShiftPDF()">📥 حفظ وتقفيل اليومية (PDF)</button>
        </div>
    </div>

    <div id="admin-tab" class="hidden">
        <div class="card" style="border:2px solid var(--s);">
            <span class="title" style="color:var(--s); border-color:var(--s);">إضافة للمخزن 📦 (صلاحية مدير)</span>
            <input type="text" id="adm-model" placeholder="اسم الموديل (مثال: طرحة سوري)">
            <input type="number" id="adm-qty" placeholder="الكمية المراد إضافتها">
            <button style="background:var(--s); color:#fff;" onclick="addStock()">إضافة للمخزن</button>
        </div>

        <div class="card">
            <span class="title">جرد المخزن الحالي</span>
            <table>
                <thead><tr><th>الموديل</th><th>الكمية المتاحة</th></tr></thead>
                <tbody id="stock-body"></tbody>
            </table>
        </div>
    </div>

</div>

<nav class="nav">
    <div class="active" id="nav-cashier" onclick="switchTab('cashier')">شاشة الموظف</div>
    <div id="nav-admin" onclick="switchTab('admin')">المخزن (المدير)</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const config = {
        apiKey: "AIzaSyCZTnzsDjfQsdsUuzwkwK4h_zTbfQqKWgY",
        authDomain: "ayten-243b0.firebaseapp.com",
        projectId: "ayten-243b0",
        databaseURL: "https://ayten-243b0-default-rtdb.firebaseio.com",
        storageBucket: "ayten-243b0.appspot.com",
        messagingSenderId: "55093741825",
        appId: "1:55093741825:web:c559c8ef92d9b6ee613300"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);

    let isAdmin = false;
    const todayDate = new Date().toISOString().split('T')[0];

    // تبديل الصلاحيات
    window.toggleRole = () => {
        if(!isAdmin) {
            let pass = prompt("برجاء إدخال باسورد الإدارة:");
            if(pass === "12345") { // باسوورد المدير
                isAdmin = true;
                document.getElementById('role-text').innerText = "(مدير)";
                alert("تم تسجيل الدخول كمدير. يمكنك الآن تعديل المخزن.");
            } else { alert("باسوورد خاطئ!"); }
        } else {
            isAdmin = false;
            document.getElementById('role-text').innerText = "(كاشير)";
            switchTab('cashier');
            alert("تم العودة لوضع الكاشير.");
        }
    };

    window.switchTab = (tab) => {
        if(tab === 'admin' && !isAdmin) return alert("لازم تسجل كمدير الأول من الزرار اللي فوق 🔒");
        document.getElementById('cashier-tab').classList.toggle('hidden', tab !== 'cashier');
        document.getElementById('admin-tab').classList.toggle('hidden', tab !== 'admin');
        document.getElementById('nav-cashier').classList.toggle('active', tab === 'cashier');
        document.getElementById('nav-admin').classList.toggle('active', tab === 'admin');
    };

    // 1. الإدمن: إضافة كميات
    window.addStock = () => {
        const model = document.getElementById('adm-model').value.trim();
        const qty = Number(document.getElementById('adm-qty').value);
        if(!model || !qty) return alert("برجاء كتابة الموديل والكمية!");

        update(ref(db, 'inventory/' + model), {
            name: model, stock: increment(qty)
        }).then(() => {
            alert("تم إضافة البضاعة للمخزن بنجاح!");
            document.getElementById('adm-model').value = '';
            document.getElementById('adm-qty').value = '';
        });
    };

    // جلب المخزن (للبيع والجرد)
    onValue(ref(db, 'inventory'), (snap) => {
        const data = snap.val();
        const sel = document.getElementById('pos-model');
        const sBody = document.getElementById('stock-body');
        
        sel.innerHTML = '<option value="">-- اختر الموديل --</option>';
        sBody.innerHTML = '';
        
        if(data) {
            for(let key in data) {
                if(data[key].stock > 0) {
                    sel.innerHTML += `<option value="${key}">${data[key].name}</option>`;
                }
                const stockClass = data[key].stock < 5 ? 'low-stock' : '';
                sBody.innerHTML += `<tr>
                    <td>${data[key].name}</td>
                    <td class="${stockClass}">${data[key].stock} قطعة</td>
                </tr>`;
            }
        }
    });

    // 2. الكاشير: بيع بالعدد والسعر
    window.sellItem = () => {
        const sel = document.getElementById('pos-model');
        const pricePerPiece = Number(document.getElementById('pos-price').value);
        const qty = Number(document.getElementById('pos-qty').value);

        if(!sel.value) return alert("اختر الموديل الأول!");
        if(!qty || qty <= 0) return alert("اكتب العدد بشكل صحيح!");
        if(!pricePerPiece || pricePerPiece <= 0) return alert("اكتب سعر القطعة صح!");

        const modelName = sel.options[sel.selectedIndex].text;
        const totalPrice = pricePerPiece * qty;
        
        // تسجيل اسم الصنف مع العدد في اليومية
        const ledgerTitle = `بيع: ${modelName} (عدد ${qty})`;
        const time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});

        // إضافة لليومية بإجمالي السعر
        push(ref(db, `ledgers/${todayDate}`), { title: ledgerTitle, amount: totalPrice, type: 'in', time });
        
        // خصم العدد الكامل من المخزن
        update(ref(db, `inventory/${sel.value}`), { stock: increment(-qty) });
        
        document.getElementById('pos-price').value = '';
        document.getElementById('pos-qty').value = '1'; // إرجاع العدد لـ 1 تلقائياً
        alert(`تم بيع عدد ${qty} قطعة وتسجيل مبلغ ${totalPrice} ج.م في اليومية!`);
    };

    // 3. الكاشير: تسجيل خارج
    window.addExpense = () => {
        const desc = document.getElementById('out-desc').value.trim();
        const val = Number(document.getElementById('out-val').value);
        if(!desc || !val) return alert("اكتب البيان والمبلغ!");

        const title = "مصروف: " + desc;
        const time = new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});

        push(ref(db, `ledgers/${todayDate}`), { title: title, amount: -Math.abs(val), type: 'out', time });
        
        document.getElementById('out-desc').value = '';
        document.getElementById('out-val').value = '';
    };

    // جلب اليومية وحساب الصافي
    onValue(ref(db, `ledgers/${todayDate}`), (snap) => {
        const data = snap.val();
        const body = document.getElementById('ledger-body');
        let totalIn = 0, totalOut = 0;
        body.innerHTML = '';
        
        if(data) {
            for(let key in data) {
                const entry = data[key];
                if(entry.amount > 0) totalIn += entry.amount;
                else totalOut += Math.abs(entry.amount);

                const color = entry.amount > 0 ? '#2ecc71' : '#e74c3c';
                body.innerHTML += `<tr>
                    <td>${entry.title}</td>
                    <td style="color:${color}; font-weight:bold;">${Math.abs(entry.amount)}</td>
                    <td style="font-size:11px; color:#888;">${entry.time}</td>
                </tr>`;
            }
        }
        
        document.getElementById('stat-in').innerText = totalIn + " ج";
        document.getElementById('stat-out').innerText = totalOut + " ج";
        document.getElementById('stat-net').innerText = (totalIn - totalOut) + " ج";
    });

    // 4. استخراج التقرير وتقفيل اليومية
    window.saveShiftPDF = () => {
        if(!confirm("هتطبع يومية الوردية دلوقتي؟")) return;
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(22);
        doc.setTextColor(194, 89, 131); 
        doc.text("Aytin Daily Shift Report", 105, 20, { align: 'center' });
        
        doc.setFontSize(14);
        doc.setTextColor(50);
        doc.text(`Date: ${todayDate}`, 105, 30, { align: 'center' });

        const rows = [];
        document.querySelectorAll('#ledger-body tr').forEach(tr => {
            const tds = tr.querySelectorAll('td');
            rows.push([tds[2].innerText, tds[1].innerText, tds[0].innerText]); 
        });

        doc.autoTable({
            head: [['Time', 'Amount (EGP)', 'Description']],
            body: rows,
            startY: 40,
            theme: 'grid',
            headStyles: { fillColor: [194, 89, 131] },
            styles: { halign: 'right' } 
        });

        const finalY = doc.lastAutoTable.finalY + 15;
        const net = document.getElementById('stat-net').innerText;
        doc.setFontSize(16);
        doc.setTextColor(74, 20, 140);
        doc.text(`Net Cash: ${net}`, 190, finalY, { align: 'right' });

        const img = new Image();
        img.src = 'icon.png';
        img.onload = function() {
            doc.addImage(img, 'PNG', 15, finalY - 10, 25, 25);
            doc.save(`Aytin_Shift_${todayDate}.pdf`);
        };
        if(!img.complete) doc.save(`Aytin_Shift_${todayDate}.pdf`);
    };
</script>
</body>
</html>
